# PMSA v2 default configuration.
# Experiment configs in configs/experiments/ override these keys shallowly.

seed: 0
out_dir: outputs
data_root: data

feature:
  cache_dir: feature_cache
  batch_size: 64
  num_workers: 4
  backbones:
    - name: clip_l14
      weights: openai/clip-vit-large-patch14
      image_size: 224
      enabled: true
    - name: dino_b14
      weights: facebook/dinov2-base
      image_size: 224
      enabled: true
    - name: npr
      weights: ""
      image_size: 256
      enabled: true
    # SigLIP backbone for training your OWN robust probe (stronger than CLIP).
    # Flip enabled: true to extract it, then: train_deploy.py --model probe --backbone siglip
    - name: siglip
      weights: google/siglip-base-patch16-224
      image_size: 224
      enabled: false
    # Forensic stream: handcrafted artifacts (spectral/color/noise) targeting
    # documented frontier-generator weaknesses. Pairs with siglip in the fusion.
    - name: forensic
      weights: ""
      image_size: 256
      enabled: false

calibration:
  alpha: 0.01          # target false-alarm rate on real images
  method: conformal    # conformal (finite-sample) | empirical
  cal_fraction: 0.5    # of the real-only calibration pool
  seed: 0

train:
  model: fusion        # linear_probe (UnivFD baseline) | fusion (PMSA v2)
  epochs: 50
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 256
  seeds: [0, 1, 2]
  val_fraction: 0.15

eval:
  bootstrap_n: 2000
  ci: 0.95
  fpr_targets: [0.01, 0.05]
